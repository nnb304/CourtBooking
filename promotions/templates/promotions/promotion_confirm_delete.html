{% extends 'base.html' %}

{% block title %}Xóa mã khuyến mãi — CourtBooking{% endblock %}

{% block content %}
<div class="container my-5" style="max-width: 480px;">
    <div class="card border-0 text-center" style="border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,.08);">
        <div class="card-body p-5">
            <div class="mb-3" style="font-size:3rem;">🗑️</div>
            <h4 class="fw-bold mb-2">Xóa mã khuyến mãi?</h4>
            <p class="text-muted mb-1">Bạn sắp xóa mã:</p>
            <p class="fw-bold mb-4" style="font-size:1.2rem; color:var(--primary); font-family:'Montserrat',sans-serif;">
                {{ promo.code }}
            </p>
            <p class="text-muted small mb-4">
                Hành động này không thể hoàn tác. Các đơn đặt sân đã dùng mã này vẫn giữ nguyên giá trị giảm.
            </p>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger fw-semibold px-4"
                            style="border-radius:10px;">
                        <i class="bi bi-trash me-1"></i>Xóa
                    </button>
                    <a href="{% url 'promotions:promotion_list' %}"
                       class="btn btn-outline-secondary px-4"
                       style="border-radius:10px;">
                        Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
