{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CourtBooking{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- CSS tùy chỉnh CourtBooking (đặt sau Bootstrap để override) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- THANH ĐIỀU HƯỚNG (tách ra partials/header.html theo layout cô dạy) -->
{% include 'partials/header.html' %}

<!-- NỘI DUNG TRANG CON (không có container ở đây, mỗi trang tự quản lý layout) -->
<main class="flex-grow-1">
    {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
{% include 'partials/footer.html' %}

<!-- TOAST NOTIFICATIONS (Bootstrap Toast, khởi tạo bằng main.js) -->
{% include 'partials/toasts.html' %}

<!-- Bootstrap 5 JS Bundle (bao gồm Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- JS tùy chỉnh CourtBooking (defer để không chặn render) -->
<script src="{% static 'js/main.js' %}" defer></script>
</body>
</html>
